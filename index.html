<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <h1>Switch Statements</h1>

    <button type ="btn btn-success" onclick="TeamRank()">Rank</button>
    <script>

        let team = "Green"; //string

        switch (team){
            case "Green":
                alert ("Go Green Hornets!");
                break;

            case "Blue":
                alert("Go Blue Bears! For the win!");
                break;

            case "Red":
                alert("Go Red Bulldogs! Laban!");
                break;

            case "Yellow":
                alert("Go Yellow Tigers! Malakas!");
                break;

            default:
                alert("No team found");
        }

        function teamRank (){
            let rank = "1st";

            switch (rank){
                case "1st":
                    message = "Champion!";
                    break;
                case "2nd":
                    message = "2nd Place!";
                    break;  
                case "3rd":
                    message = "3rd Place!";
                    break;
                case "4th":
                    message = "4th Place!";
                    break;
                default:
                    message = "Ranking could not be determined.";
            }
            alert(message);
        }
    </script>
    
</body>
</html>
